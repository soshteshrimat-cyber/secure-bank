<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecureBank - Live</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", sans-serif; }
        body { height: 100vh; background: linear-gradient(135deg, #0a1f44, #1c3d5a, #2a5298); display: flex; justify-content: center; align-items: center; }
        .card { width: 340px; padding: 35px; border-radius: 20px; background: rgba(255,255,255,0.1); backdrop-filter: blur(20px); color: white; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.4); }
        .input-group { position: relative; width: 100%; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: none; outline: none; margin-bottom: 10px; }
        .eye-icon { position: absolute; right: 10px; top: 12px; cursor: pointer; color: #333; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(90deg, #00c6ff, #0072ff); color: white; cursor: pointer; }
        .hidden { display: none; }
        .error { color: #ff6b6b; font-size: 12px; margin: 5px 0; }
        .otp-field { width: 35px; height: 45px; text-align: center; margin: 5px; border-radius: 8px; border: none; }
        .timer { font-size: 13px; margin-top: 10px; color: #00ffcc; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card" id="regCard">
            <h1>Register</h1>
            <input type="text" id="u" placeholder="Username">
            <div class="input-group"><input type="password" id="p" placeholder="Password"><span class="eye-icon" onclick="toggle('p')">👁️</span></div>
            <div class="input-group"><input type="password" id="cp" placeholder="Confirm"><span class="eye-icon" onclick="toggle('cp')">👁️</span></div>
            <div class="error" id="re"></div>
            <button onclick="register()">Create Account</button>
        </div>

        <div class="card hidden" id="logCard">
            <h1>Login</h1>
            <input type="text" id="lu" placeholder="Username">
            <div class="input-group"><input type="password" id="lp" placeholder="Password"><span class="eye-icon" onclick="toggle('lp')">👁️</span></div>
            <div class="error" id="le"></div>
            <button onclick="login()">Login</button>
        </div>

        <div class="card hidden" id="otpCard">
            <h1>Verify</h1>
            <span onclick="showOTP()" style="cursor:pointer; font-size: 11px;">👁️ View OTP</span>
            <div id="od" style="font-weight: bold; margin: 10px 0;"></div>
            <div style="display: flex; justify-content: center;">
                <input maxlength="1" class="of"> <input maxlength="1" class="of"> <input maxlength="1" class="of">
                <input maxlength="1" class="of"> <input maxlength="1" class="of"> <input maxlength="1" class="of">
            </div>
            <div class="timer" id="timer"></div>
            <div class="error" id="oe"></div>
            <button onclick="verify()">Verify</button>
            <p onclick="resend()" style="font-size: 12px; cursor: pointer; margin-top: 10px;">Resend OTP</p>
        </div>

        <div class="card hidden" id="sc"><h1>✅ Welcome!</h1></div>
    </div>

    <script>
        let user = "", timeLeft = 120, timer;

        function toggle(id) { const i = document.getElementById(id); i.type = i.type === "password" ? "text" : "password"; }

        async function register() {
            const u = document.getElementById("u").value, p = document.getElementById("p").value;
            if(p !== document.getElementById("cp").value) return document.getElementById("re").innerText = "Mismatch";
            // FIXED URL HERE
            const res = await fetch("https://secure-bank-api.onrender.com/register", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: u, password: p}) });
            if((await res.json()).success) { regCard.classList.add("hidden"); logCard.classList.remove("hidden"); }
        }

        async function login() {
            user = document.getElementById("lu").value;
            const res = await fetch("https://secure-bank-api.onrender.com/login", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: user, password: document.getElementById("lp").value}) });
            if((await res.json()).success) {
                await fetch("https://secure-bank-api.onrender.com/request_otp", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: user}) });
                logCard.classList.add("hidden"); otpCard.classList.remove("hidden"); start();
            }
        }

        async function showOTP() {
            const res = await fetch(`https://secure-bank-api.onrender.com/get_otp/${user}`);
            const data = await res.json();
            const d = document.getElementById("od");
            d.innerText = data.otp === null ? "VANISHED" : data.otp;
            d.style.color = data.otp === null ? "#ff6b6b" : "#00ffcc";
        }

        async function verify() {
            let o = ""; document.querySelectorAll(".of").forEach(i => o += i.value);
            const res = await fetch("https://secure-bank-api.onrender.com/verify_otp", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: user, otp: o}) });
            const data = await res.json();
            if(data.success) { otpCard.classList.add("hidden"); sc.classList.remove("hidden"); }
            else { document.getElementById("oe").innerText = data.message; }
        }

        async function resend() {
            await fetch("https://secure-bank-api.onrender.com/resend_otp", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({username: user}) });
            document.getElementById("oe").innerText = "New OTP Sent"; start();
        }

        function start() {
            timeLeft = 120; clearInterval(timer);
            timer = setInterval(() => {
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById("timer").innerText = `Expires in: ${m}:${s < 10 ? '0' + s : s}`;
                if (timeLeft-- <= 0) { clearInterval(timer); document.getElementById("timer").innerText = "Expired!"; }
            }, 1000);
        }

        document.querySelectorAll('.of').forEach((f, i, a) => {
            f.addEventListener('input', () => { if(f.value && i < 5) a[i+1].focus(); });
            f.addEventListener('keydown', (e) => { if(e.key === 'Backspace' && !f.value && i > 0) a[i-1].focus(); });
        });
    </script>
</body>
</html>
