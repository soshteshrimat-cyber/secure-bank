<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank - Live</title>
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #0a1f44, #1c3d5a, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
        }
        h2 { margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.9);
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            border: none;
            border-radius: 8px;
            background: #00a8ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background: #0086cc; }
        button:disabled { background: #555; cursor: not-allowed; }
        .toggle-link {
            margin-top: 15px;
            font-size: 0.9em;
            cursor: pointer;
            color: #00a8ff;
            text-decoration: underline;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="registerCard" class="card">
        <h2>Register</h2>
        <input type="text" id="regUsername" placeholder="Username">
        <input type="password" id="regPassword" placeholder="Password">
        <input type="password" id="regConfirm" placeholder="Confirm Password">
        <button id="regBtn" onclick="register()">Create Account</button>
        <p class="toggle-link" onclick="toggleCards()">Already have an account? Login</p>
    </div>

    <div id="loginCard" class="card hidden">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn" onclick="login()">Login</button>
        <p class="toggle-link" onclick="toggleCards()">Need an account? Register</p>
    </div>

    <div id="otpCard" class="card hidden">
        <h2>Verification</h2>
        <p>Enter the 6-digit code</p>
        <input type="text" id="otpInput" placeholder="000000" maxlength="6">
        <button id="otpBtn" onclick="verifyOTP()">Verify OTP</button>
    </div>

    <script>
        // REPLACE THIS URL with your actual Render URL
        const API_URL = "https://secure-bank-api.onrender.com";
        let currentUsername = "";

        function toggleCards() {
            document.getElementById('registerCard').classList.toggle('hidden');
            document.getElementById('loginCard').classList.toggle('hidden');
        }

        async function register() {
            const user = document.getElementById('regUsername').value;
            const pass = document.getElementById('regPassword').value;
            const conf = document.getElementById('regConfirm').value;
            const btn = document.getElementById('regBtn');

            if (!user || !pass || !conf) return alert("Fill all fields");
            if (pass !== conf) return alert("Passwords do not match");

            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
                const res = await fetch(`${API_URL}/register`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert("Account Created Successfully!");
                    toggleCards();
                } else {
                    alert("Error: " + data.message);
                }
            } catch (err) {
                alert("Server connection failed. Is Render awake?");
            } finally {
                btn.disabled = false;
                btn.innerText = "Create Account";
            }
        }

        async function login() {
            const user = document.getElementById('loginUsername').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerText = "Checking...";

            try {
                const res = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: user, password: pass })
                });
                const data = await res.json();

                if (data.success) {
                    currentUsername = user;
                    // Request OTP immediately
                    await fetch(`${API_URL}/request_otp`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ username: user })
                    });
                    document.getElementById('loginCard').classList.add('hidden');
                    document.getElementById('otpCard').classList.remove('hidden');
                } else {
                    alert("Login failed!");
                }
            } catch (err) {
                alert("Connection error");
            } finally {
                btn.disabled = false;
                btn.innerText = "Login";
            }
        }

        async function verifyOTP() {
            const otp = document.getElementById('otpInput').value;
            try {
                const res = await fetch(`${API_URL}/verify_otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ username: currentUsername, otp: otp })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Access Granted! Welcome to SecureBank.");
                    location.reload();
                } else {
                    alert("Invalid OTP code.");
                }
            } catch (err) {
                alert("Verification failed");
            }
        }
    </script>
</body>
</html>
